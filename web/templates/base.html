<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestFlight Watcher | {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        };
    </script>
    <link
        rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%8D%3C/text%3E%3C/svg%3E"
    >
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">
    <nav class="bg-gray-900 border-b border-gray-800">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <a href="/" class="text-lg md:text-xl font-bold tracking-tight hover:text-green-400 transition-colors">
                🔍 TestFlight Watcher
            </a>
            <div class="flex items-center gap-2 sm:gap-3 text-sm">
                <a href="/" class="px-3 py-2 rounded-lg hover:bg-gray-800 transition-colors" title="Dashboard">
                    <span class="sm:hidden">🏠</span>
                    <span class="hidden sm:inline">🏠 Dashboard</span>
                </a>
                <a href="/apps" class="px-3 py-2 rounded-lg hover:bg-gray-800 transition-colors" title="All Apps">
                    <span class="sm:hidden">📱</span>
                    <span class="hidden sm:inline">📱 All Apps</span>
                </a>
                <a
                    href="https://t.me/{{ BOT_USERNAME }}"
                    target="_blank"
                    rel="noopener noreferrer"
                    class="px-3 py-2 rounded-lg hover:bg-gray-800 transition-colors"
                    title="Telegram Bot"
                >
                    <span class="sm:hidden">🤖</span>
                    <span class="hidden sm:inline">🤖 Telegram Bot</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-gray-900 border-t border-gray-800 text-center py-4 text-gray-500 text-sm">
        <p>
            Made with ❤️ | TestFlight Watcher Bot |
            <a
                href="https://t.me/{{ BOT_USERNAME }}"
                target="_blank"
                rel="noopener noreferrer"
                class="text-green-400 hover:text-green-300"
            >
                Telegram
            </a>
        </p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
